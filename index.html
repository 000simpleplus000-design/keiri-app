<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん帳簿</title>
<style>
    /* 画面全体のデザイン設定 */
    body { font-family: sans-serif; padding: 10px; background: #fdfdfd; max-width: 600px; margin: auto; }
    input, select, button { width:100%; margin:5px 0; padding:12px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
    .hidden { display:none !important; }
    table { width:100%; border-collapse: collapse; margin-top: 10px; background: white; }
    td, th { border:1px solid #ccc; padding:10px; font-size:13px; text-align: left; }
    th { background: #f0f0f0; }
    #summary { background: #eef; padding: 15px; border-radius: 6px; margin: 10px 0; font-weight: bold; border-left: 5px solid #007bff; }
    .btn-del { width: auto; padding: 5px 10px; margin: 0; background: #ff4d4d; color: white; border: none; font-size: 11px; cursor: pointer; border-radius: 4px; }
    .month-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
    .btn-logout { background: #dc3545 !important; color: white; font-weight: bold; margin-top: 20px; }
</style>
</head>
<body>

<div id="loginArea">
    <h2>ログイン</h2>
    <input type="email" id="email" placeholder="メールアドレス">
    <input type="password" id="pass" placeholder="パスワード">
    <button id="btnLogin" style="background:#007bff; color:white;">ログイン</button>
    <button id="btnSignup" style="background:#6c757d; color:white; margin-top:10px;">新規登録</button>
</div>

<div id="mainArea" class="hidden">
    <select id="mode">
        <option value="売上">売上を入力</option>
        <option value="経費">経費を入力</option>
    </select>
    <input type="date" id="date">
    
    <div id="salesArea">
        <select id="salesCategory"><option>BOOTH</option><option>LINE</option><option>Kindle</option><option>その他</option></select>
        <input type="number" id="salesAmount" placeholder="売上金額">
        <input type="text" id="salesNote" placeholder="備考">
    </div>

    <div id="expenseArea" class="hidden">
        <select id="expenseAccount"><option>通信費</option><option>サブスク</option><option>消耗品費</option><option>地代家賃</option><option>雑費</option></select>
        <input type="number" id="amount" placeholder="支払金額">
        <input type="number" id="rate" placeholder="按分率（%）" value="100">
        <input type="number" id="finalAmount" placeholder="経費計上額" readonly style="background:#f9f9f9;">
    </div>

    <button id="btnAdd" style="background:#28a745; color:white; font-weight:bold; margin-top:10px;">データを追加</button>
    
    <div id="summary">売上：0円 / 経費：0円<br>利益：0円</div>

    <button id="btnCSV" style="background:#6c757d; color:white;">CSV保存</button>
    <button onclick="logout()" class="btn-logout">ログアウトして終了</button>
    
    <h3>履歴一覧</h3>
    <table>
        <thead>
            <tr><th>日付</th><th>種類</th><th>金額</th><th>操作</th></tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>

    <h3>月別利益</h3>
    <div id="monthlySummary"></div>
</div>

<script type="module">
// Firebase関連ライブラリの読み込み
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserSessionPersistence, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Firebaseの設定情報
const firebaseConfig = {
    apiKey: "AIzaSyA-3BwLPxZUTLzXVeaFYkFyujbsRqXl_MQ",
    authDomain: "keiri-app-simple.firebaseapp.com",
    projectId: "keiri-app-simple",
    storageBucket: "keiri-app-simple.firebasestorage.app",
    messagingSenderId: "1023884345508",
    appId: "1:1023884345508:web:898993ee41b4be7cd62631"
};

// サービスの初期化
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

// 内部データ管理用の変数
let sales = [];
let expense = [];
let isLoaded = false; 

// ログアウト処理：セッションを終了して画面をリロード
window.logout = () => {
    if(!confirm("ログアウトしますか？")) return;
    signOut(auth).then(() => {
        location.reload(); 
    }).catch((e) => alert("ログアウト失敗"));
};

// ログイン処理：ブラウザを閉じたらログアウトする設定で認証
document.getElementById("btnLogin").onclick = () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    if(!email || !pass) return alert("メールとパスワードを入力してください");

    setPersistence(auth, browserSessionPersistence)
        .then(() => {
            return signInWithEmailAndPassword(auth, email, pass);
        })
        .catch((e) => alert("ログイン失敗: " + e.message));
};

// 新規登録処理：新しいアカウントを作成
document.getElementById("btnSignup").onclick = () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    if(!email || !pass) return alert("メールとパスワードを入力してください");

    setPersistence(auth, browserSessionPersistence)
        .then(() => {
            return createUserWithEmailAndPassword(auth, email, pass);
        })
        .then(() => alert("登録完了しました"))
        .catch((e) => alert("登録失敗: " + e.message));
};

// データの削除処理：一覧から取り除き、クラウドを更新
window.deleteItem = async (type, index) => {
    if(!isLoaded) return alert("データを読み込み中です...");
    if(!confirm("このデータを削除しますか？")) return;
    if(type === 'sales') sales.splice(index, 1);
    else expense.splice(index, 1);
    refreshDisplay();
    await saveToFirebase();
};

// 画面表示の更新処理：計算とテーブル作成
function refreshDisplay() {
    let sTotal = 0; let eTotal = 0; let tableHtml = ""; let monthlyData = {};

    // 売上の集計と一覧作成
    sales.forEach((item, idx) => {
        const amt = Number(item.amount) || 0;
        sTotal += amt;
        tableHtml += `<tr><td>${item.date}</td><td>売上:${item.category}</td><td>${amt.toLocaleString()}円</td>
                      <td><button class="btn-del" onclick="deleteItem('sales', ${idx})">削除</button></td></tr>`;
        const ym = item.date.substring(0, 7);
        if(!monthlyData[ym]) monthlyData[ym] = {s:0, e:0};
        monthlyData[ym].s += amt;
    });

    // 経費の集計と一覧作成
    expense.forEach((item, idx) => {
        const amt = Number(item.amount) || 0;
        eTotal += amt;
        tableHtml += `<tr><td>${item.date}</td><td>経費:${item.category}</td><td>${amt.toLocaleString()}円</td>
                      <td><button class="btn-del" onclick="deleteItem('expense', ${idx})">削除</button></td></tr>`;
        const ym = item.date.substring(0, 7);
        if(!monthlyData[ym]) monthlyData[ym] = {s:0, e:0};
        monthlyData[ym].e += amt;
    });
