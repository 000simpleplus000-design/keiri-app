<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-title" content="経理">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">

<title>かんたん帳簿</title>

<style>
body { font-family: sans-serif; padding: 10px; }
input, select, button { width:100%; margin:5px 0; padding:10px; }
.hidden { display:none; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
td, th { border:1px solid #ccc; padding:5px; font-size:12px; }
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginArea">
<h2>ログイン</h2>
<input type="text" id="id" placeholder="ID">
<input type="password" id="pass" placeholder="パスワード">
<button onclick="login()">ログイン</button>
</div>

<!-- メイン -->
<div id="mainArea" class="hidden">

<select id="mode">
<option value="売上">売上</option>
<option value="経費">経費</option>
</select>

<input type="date" id="date">
<input type="text" id="month" readonly placeholder="月">

<!-- 売上 -->
<div id="salesArea">

<select id="salesCategory">
<option>LINE</option>
<option>BOOTH</option>
<option>Kindle</option>
<option>その他</option>
</select>

<select id="salesAccount">
<option>売上</option>
<option>雑収入</option>
</select>

<input type="number" id="salesAmount" placeholder="売上金額">
<input type="text" id="salesNote" placeholder="備考">

</div>

<!-- 経費 -->
<div id="expenseArea" class="hidden">

<select id="expenseAccount">
<option>通信費</option>
<option>サブスク</option>
<option>仕入</option>
<option>交通費</option>
<option>雑費</option>
</select>

<select id="payment">
<option>現金</option>
<option>クレカ</option>
<option>電子マネー</option>
</select>

<input type="number" id="amount" placeholder="支払金額">
<input type="number" id="rate" placeholder="按分率">
<input type="number" id="finalAmount" readonly placeholder="経費計上額">
<input type="text" id="expenseNote" placeholder="備考">

</div>

<button onclick="addData()">追加</button>
<button onclick="downloadCSV()">CSV出力</button>

<div id="summary"></div>

<h3>一覧</h3>
<table id="dataTable"></table>

</div>

<script>

// ===== ユーザー =====
const users = {
  "admin": "1234",
  "user": "0000",
  "yuha": "1324",
  "u-to": "5678"
};

let currentUser = "";

// ===== ログイン =====
function login(){
  const idValue = document.getElementById("id").value.trim();
  const passValue = document.getElementById("pass").value.trim();

  if(users[idValue] && users[idValue] === passValue){
    currentUser = idValue;

    document.getElementById("loginArea").classList.add("hidden");
    document.getElementById("mainArea").classList.remove("hidden");

    initApp();
    loadData();
  }else{
    alert("IDかパスワード違います");
  }
}

// ===== 初期化 =====
function initApp(){

  document.getElementById("date").addEventListener("change",()=>{
    const d=new Date(document.getElementById("date").value);
    document.getElementById("month").value=d.getMonth()+1;
  });

  document.getElementById("mode").addEventListener("change",()=>{
    document.getElementById("salesArea").classList.toggle("hidden", mode.value!=="売上");
    document.getElementById("expenseArea").classList.toggle("hidden", mode.value!=="経費");
  });

  document.getElementById("rate").addEventListener("input",()=>{
    const amount = document.getElementById("amount").value;
    const rate = document.getElementById("rate").value;
    document.getElementById("finalAmount").value = Math.floor(amount * rate / 100);
  });

}

// ===== データ =====
let sales=[];
let expense=[];

function getKey(type){
  return type + "_" + currentUser;
}

function saveData(){
  localStorage.setItem(getKey("sales"), JSON.stringify(sales));
  localStorage.setItem(getKey("expense"), JSON.stringify(expense));
}

function loadData(){
  sales = JSON.parse(localStorage.getItem(getKey("sales"))) || [];
  expense = JSON.parse(localStorage.getItem(getKey("expense"))) || [];
  calc();
}

// ===== 追加 =====
function addData(){

  if(document.getElementById("mode").value==="売上"){

    sales.push({
      date: document.getElementById("date").value,
      category: document.getElementById("salesCategory").value,
      account: document.getElementById("salesAccount").value,
      amount: Number(document.getElementById("salesAmount").value),
      note: document.getElementById("salesNote").value
    });

  }else{

    expense.push({
      date: document.getElementById("date").value,
      account: document.getElementById("expenseAccount").value,
      payment: document.getElementById("payment").value,
      amount: Number(document.getElementById("finalAmount").value),
      note: document.getElementById("expenseNote").value
    });

  }

  saveData();
  calc();
}

// ===== 集計＋一覧 =====
function calc(){

  let s=sales.reduce((a,b)=>a+b.amount,0);
  let e=expense.reduce((a,b)=>a+b.amount,0);

  document.getElementById("summary").innerHTML =
    `売上:${s}円 / 経費:${e}円 / 利益:${s-e}円`;

  render();
}

// ===== 一覧表示 =====
function render(){

  let html="<tr><th>日付</th><th>区分</th><th>金額</th><th></th></tr>";

  sales.forEach((s,i)=>{
    html+=`<tr>
    <td>${s.date}</td>
    <td>${s.category}</td>
    <td>${s.amount}</td>
    <td><button onclick="del('s',${i})">削除</button></td>
    </tr>`;
  });

  expense.forEach((e,i)=>{
    html+=`<tr>
    <td>${e.date}</td>
    <td>${e.account}</td>
    <td>${e.amount}</td>
    <td><button onclick="del('e',${i})">削除</button></td>
    </tr>`;
  });

  document.getElementById("dataTable").innerHTML=html;
}

// ===== 削除 =====
function del(type,i){
  if(type==="s"){ sales.splice(i,1); }
  else{ expense.splice(i,1); }
  saveData();
  calc();
}

// ===== CSV =====
function downloadCSV(){

  let csv="日付,区分,金額\n";

  sales.forEach(s=>{
    csv+=`${s.date},${s.category},${s.amount}\n`;
  });

  expense.forEach(e=>{
    csv+=`${e.date},${e.account},${e.amount}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="keiri.csv";
  link.click();
}

</script>

</body>
</html>
