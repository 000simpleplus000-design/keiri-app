<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="apple-touch-icon" href="icon.png?v=2">
<link rel="shortcut icon" href="icon.png?v=2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>かんたん帳簿 v2.1</title>
<style>
    /* 画面全体のデザイン設定 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 10px; background: #fdfdfd; max-width: 600px; margin: auto; }
    input, select, button { width:100%; margin:5px 0; padding:12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; -webkit-appearance: none; }
    .hidden { display:none !important; }
    table { width:100%; border-collapse: collapse; margin-top: 10px; background: white; }
    td, th { border:1px solid #ccc; padding:10px; font-size:13px; text-align: left; }
    th { background: #f0f0f0; }
    #summary { background: #eef; padding: 15px; border-radius: 6px; margin: 10px 0; font-weight: bold; border-left: 5px solid #007bff; }
    .btn-del { width: auto; padding: 5px 10px; background: #ff4d4d; color: white; border: none; font-size: 11px; cursor: pointer; border-radius: 4px; }
    .btn-edit { width: auto; padding: 5px 10px; background: #ffc107; color: black; border: none; font-size: 11px; cursor: pointer; border-radius: 4px; }
    .month-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
    .btn-logout { background: #dc3545 !important; color: white; font-weight: bold; margin-top: 20px; }
</style>
</head>
<body>

<div id="loginArea">
    <h2 id="loginStatus">ログイン</h2>
    <input type="email" id="email" placeholder="メールアドレス">
    <input type="password" id="pass" placeholder="パスワード">
    <button id="btnLogin" style="background:#007bff; color:white;">ログイン</button>
    <button id="btnSignup" style="background:#6c757d; color:white; margin-top:10px;">新規登録</button>
</div>

<div id="mainArea" class="hidden">
    <select id="mode">
        <option value="売上">売上を入力</option>
        <option value="経費">経費を入力</option>
    </select>
    <input type="date" id="date">
    
    <div id="salesArea">
        <select id="salesCategory"><option>BOOTH</option><option>LINE</option><option>Kindle</option><option>その他</option></select>
        <input type="number" id="salesAmount" placeholder="売上金額">
        <input type="text" id="salesNote" placeholder="備考">
    </div>

    <div id="expenseArea" class="hidden">
        <select id="expenseAccount"><option>通信費</option><option>サブスク</option><option>消耗品費</option><option>地代家賃</option><option>雑費</option></select>
        <input type="number" id="amount" placeholder="支払金額">
        <input type="number" id="rate" placeholder="按分率（%）" value="100">
        <input type="number" id="finalAmount" placeholder="経費計上額" readonly style="background:#f9f9f9;">
    </div>

    <button id="btnAdd" style="background:#28a745; color:white; font-weight:bold; margin-top:10px;">データ追加</button>
    
    <div id="summary">売上：0円 / 経費：0円<br>利益：0円</div>

    <button id="btnCSV" style="background:#6c757d; color:white;">CSV保存</button>
    <button onclick="logout()" class="btn-logout">ログアウトして終了</button>
    
    <h3>履歴一覧</h3>
    <table>
        <thead>
            <tr><th>日付</th><th>種類</th><th>金額</th><th>操作</th></tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>

    <h3>月別利益</h3>
    <div id="monthlySummary"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA-3BwLPxZUTLzXVeaFYkFyujbsRqXl_MQ",
    authDomain: "keiri-app-simple.firebaseapp.com",
    projectId: "keiri-app-simple",
    storageBucket: "keiri-app-simple.firebasestorage.app",
    messagingSenderId: "1023884345508",
    appId: "1:1023884345508:web:898993ee41b4be7cd62631"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let sales = [];
let expense = [];
let isLoaded = false; 
let editTarget = null; // 修正中データの情報を一時保存する変数

// ログアウト処理
window.logout = () => {
    if(!confirm("ログアウトしますか？")) return;
    signOut(auth).then(() => { location.reload(); });
};

// ログイン処理
document.getElementById("btnLogin").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value.trim();
    if(!email || !pass) return alert("入力が空です");
    document.getElementById("loginStatus").innerText = "通信中...";
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
        document.getElementById("loginStatus").innerText = "ログイン";
        alert("ログイン失敗: " + e.message);
    }
};

// 新規登録処理
document.getElementById("btnSignup").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value.trim();
    if(!email || !pass) return alert("入力が空です");
    try {
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("登録完了！");
    } catch (e) {
        alert("登録エラー: " + e.message);
    }
};

// データの削除
window.deleteItem = async (type, index) => {
    if(!isLoaded) return;
    if(!confirm("このデータを削除しますか？")) return;
    if(type === 'sales') sales.splice(index, 1);
    else expense.splice(index, 1);
    refreshDisplay();
    await saveToFirebase();
};

// データの修正：一覧からは消さず、入力欄にコピーするだけにする
window.editItem = (type, index) => {
    const item = type === 'sales' ? sales[index] : expense[index];
    
    // 修正モードであることを記録
    editTarget = { type, index };

    const modeSelect = document.getElementById("mode");
    modeSelect.value = type === 'sales' ? "売上" : "経費";
    modeSelect.dispatchEvent(new Event('change'));
    document.getElementById("date").value = item.date;

    if(type === 'sales') {
        document.getElementById("salesCategory").value = item.category;
        document.getElementById("salesAmount").value = item.amount;
        document.getElementById("salesNote").value = item.note || "";
    } else {
        document.getElementById("expenseAccount").value = item.category;
        document.getElementById("amount").value = item.originalAmount || item.amount;
        document.getElementById("rate").value = item.rate || 100;
        calcFinal();
    }
    
    // ボタンの色を一時的に変えて修正中であることを示す
    const addBtn = document.getElementById("btnAdd");
    addBtn.innerText = "データを上書き保存";
    addBtn.style.background = "#ffc107";
    addBtn.style.color = "black";

    window.scrollTo(0, 0); // 入力欄までスクロール
};

// 画面表示の更新処理
function refreshDisplay() {
    let sTotal = 0; let eTotal = 0; let tableHtml = ""; let monthlyData = {};

    sales.forEach((item, idx) => {
        const amt = Number(item.amount) || 0;
        sTotal += amt;
        tableHtml += `<tr><td>${item.date}</td><td>売上:${item.category}</td><td>${amt.toLocaleString()}円</td>
                      <td><button class="btn-edit" onclick="editItem('sales', ${idx})">修正</button> <button class="btn-del" onclick="deleteItem('sales', ${idx})">削除</button></td></tr>`;
        const ym = item.date.substring(0, 7);
        if(!monthlyData[ym]) monthlyData[ym] = {s:0, e:0};
        monthlyData[ym].s += amt;
    });

    expense.forEach((item, idx) => {
        const amt = Number(item.amount) || 0;
        eTotal += amt;
        tableHtml += `<tr><td>${item.date}</td><td>経費:${item.category}</td><td>${amt.toLocaleString()}円</td>
                      <td><button class="btn-edit" onclick="editItem('expense', ${idx})">修正</button> <button class="btn-del" onclick="deleteItem('expense', ${idx})">削除</button></td></tr>`;
        const ym = item.date.substring(0, 7);
        if(!monthlyData[ym]) monthlyData[ym] = {s:0, e:0};
        monthlyData[ym].e += amt;
    });

    document.getElementById("dataBody").innerHTML = tableHtml;
    document.getElementById("summary").innerHTML = `売上：${sTotal.toLocaleString()}円 / 経費：${eTotal.toLocaleString()}円<br>利益：${(sTotal - eTotal).toLocaleString()}円`;

    // 月別利益の表示：2025年6月開始に対応した特別な並び替え
    let mHtml = "";
    const sortedKeys = Object.keys(monthlyData).sort((a, b) => {
        if (a === "2025-06") return -1;
        if (b === "2025-06") return 1;
        return b.localeCompare(a);
    });
    sortedKeys.forEach(ym => {
        const [year, month] = ym.split("-");
        const profit = monthlyData[ym].s - monthlyData[ym].e;
        mHtml += `<div class="month-item"><span>${year}年${month}月</span> <span>利益 ${profit.toLocaleString()}円</span></div>`;
    });
    document.getElementById("monthlySummary").innerHTML = mHtml;
}

// クラウド保存処理
async function saveToFirebase() {
    const user = auth.currentUser;
    if (user && isLoaded) await set(ref(db, "users/" + user.uid), { sales, expense });
}

// クラウド読み込み処理
async function loadFromFirebase() {
    const user = auth.currentUser;
    if (!user) return;
    const snapshot = await get(ref(db, "users/" + user.uid));
    if (snapshot.exists()) {
        const data = snapshot.val();
        sales = Array.isArray(data.sales) ? data.sales : [];
        expense = Array.isArray(data.expense) ? data.expense : [];
    }
    isLoaded = true; 
    refreshDisplay();
}

// 認証状態の監視
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginArea").classList.add("hidden");
        document.getElementById("mainArea").classList.remove("hidden");
        loadFromFirebase();
    } else {
        document.getElementById("loginArea").classList.remove("hidden");
        document.getElementById("mainArea").classList.add("hidden");
        isLoaded = false;
    }
});

// データ追加（更新）ボタンの処理
document.getElementById("btnAdd").onclick = async function() {
    if(!isLoaded) return;
    const dateInput = document.getElementById("date").value;
    if (!dateInput) return alert("日付を選択してください");
    const mode = document.getElementById("mode").value;
    
    let newData;
    if (mode === "売上") {
        const amt = document.getElementById("salesAmount").value;
        if (!amt) return alert("金額を入れてください");
        newData = { date: dateInput, category: document.getElementById("salesCategory").value, amount: Number(amt), note: document.getElementById("salesNote").value };
    } else {
        const finalAmt = document.getElementById("finalAmount").value;
        if (!finalAmt || finalAmt == "0") return alert("金額を確認してください");
        newData = { date: dateInput, category: document.getElementById("expenseAccount").value, amount: Number(finalAmt), originalAmount: Number(document.getElementById("amount").value), rate: Number(document.getElementById("rate").value) };
    }

    // 修正モードの場合、元の場所を差し替える
    if (editTarget) {
        if (editTarget.type === 'sales') sales[editTarget.index] = newData;
        else expense[editTarget.index] = newData;
        editTarget = null; // モード解除
    } else {
        // 新規追加の場合
        if (mode === "売上") sales.push(newData);
        else expense.push(newData);
    }

    // ボタン表示を元に戻す
    const addBtn = document.getElementById("btnAdd");
    addBtn.innerText = "データ追加";
    addBtn.style.background = "#28a745";
    addBtn.style.color = "white";

    // 入力欄をクリア
    document.getElementById("salesAmount").value = "";
    document.getElementById("salesNote").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("finalAmount").value = "";

    refreshDisplay();
    await saveToFirebase();
};

// UI制御：売上と経費の表示切替
document.getElementById("mode").onchange = function() {
    const isSales = this.value === "売上";
    document.getElementById("salesArea").classList.toggle("hidden", !isSales);
    document.getElementById("expenseArea").classList.toggle("hidden", isSales);
};

// 経費按分計算
const calcFinal = () => {
    const a = Number(document.getElementById("amount").value) || 0;
    const r = Number(document.getElementById("rate").value) || 0;
    document.getElementById("finalAmount").value = Math.floor(a * r / 100);
};
document.getElementById("amount").oninput = calcFinal;
document.getElementById("rate").oninput = calcFinal;

// CSV出力処理
document.getElementById("btnCSV").onclick = () => {
    let csv = "\uFEFF日付,種類,金額\n";
    sales.forEach(s => csv += `${s.date},売上:${s.category},${s.amount}\n`);
    expense.forEach(e => csv += `${e.date},経費:${e.category},${e.amount}\n`);
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    link.download = "keiri.csv";
    link.click();
};
</script>
</body>
</html>
