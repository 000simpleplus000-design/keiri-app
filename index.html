<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-title" content="経理">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん帳簿</title>
<style>
body { font-family: sans-serif; padding: 8px; }
input, select, button { width:100%; margin:3px 0; padding:8px; box-sizing: border-box; }
.hidden { display:none; }
table { width:100%; border-collapse: collapse; margin-top: 10px; }
td, th { border:1px solid #ccc; padding:5px; font-size:12px; text-align: left; }
th { background: #f0f0f0; }
#summary { background: #eef; padding: 10px; border-radius: 5px; margin: 10px 0; line-height: 1.5; }
</style>
</head>
<body>

<div id="loginArea">
    <h2>ログイン</h2>
    <input type="text" id="id" placeholder="メール">
    <input type="password" id="pass" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
    <button onclick="signup()">新規登録</button>
</div>

<div id="mainArea" class="hidden">
    <select id="mode">
        <option value="売上">売上</option>
        <option value="経費">経費</option>
    </select>

    <input type="date" id="date">
    <input type="text" id="month" readonly placeholder="月">

    <div id="salesArea">
        <label>売上区分</label>
        <select id="salesCategory"><option>BOOTH</option><option>LINE</option><option>Kindle</option><option>その他</option></select>
        <label>勘定科目</label>
        <select id="salesAccount"><option>売上</option><option>雑収入</option></select>
        <input type="number" id="salesAmount" placeholder="売上金額">
        <input type="text" id="salesNote" placeholder="備考">
    </div>

    <div id="expenseArea" class="hidden">
        <label>勘定科目</label>
        <select id="expenseAccount">
            <option>通信費</option><option>サブスク</option><option>水道光熱費</option><option>消耗品費</option><option>地代家賃</option><option>雑費</option>
        </select>
        <label>支払方法</label>
        <select id="payment"><option>現金</option><option>口座引落</option><option>クレカ</option><option>電子マネー</option></select>
        <input type="number" id="amount" placeholder="支払金額">
        <input type="number" id="rate" placeholder="按分率（%）" value="100">
        <input type="number" id="finalAmount" placeholder="経費計上額" readonly title="自動計算されます">
        <input type="text" id="expenseNote" placeholder="備考">
    </div>

    <button onclick="addData()">追加</button>
    <button onclick="downloadCSV()">CSV保存</button>
    <button onclick="saveAndClose()">保存を確認</button>
    
    <div id="summary">ここに合計が表示されます</div>

    <h3>一覧</h3>
    <table id="dataTable">
        <thead>
            <tr><th>日付</th><th>項目</th><th>金額</th><th>操作</th></tr>
        </thead>
        <tbody id="dataBody">
            </tbody>
    </table>

    <h3>月別利益</h3>
    <div id="monthlySummary"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA-3BwLPxZUTLzXVeaFYkFyujbsRqXl_MQ",
    authDomain: "keiri-app-simple.firebaseapp.com",
    projectId: "keiri-app-simple",
    storageBucket: "keiri-app-simple.firebasestorage.app",
    messagingSenderId: "1023884345508",
    appId: "1:1023884345508:web:898993ee41b4be7cd62631"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let sales = [];
let expense = [];

// ログイン監視
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginArea").classList.add("hidden");
        document.getElementById("mainArea").classList.remove("hidden");
        loadData();
    }
});

window.login = () => {
    const email = document.getElementById("id").value;
    const password = document.getElementById("pass").value;
    signInWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
};

window.signup = () => {
    const email = document.getElementById("id").value;
    const password = document.getElementById("pass").value;
    createUserWithEmailAndPassword(auth, email, password).then(() => alert("登録完了")).catch(e => alert(e.message));
};

// 入力補助
document.getElementById("date").addEventListener("change", function() {
    if(this.value) {
        const d = new Date(this.value);
        document.getElementById("month").value = d.getMonth() + 1;
    }
});

document.getElementById("mode").addEventListener("change", function() {
    const isSales = this.value === "売上";
    document.getElementById("salesArea").classList.toggle("hidden", !isSales);
    document.getElementById("expenseArea").classList.toggle("hidden", isSales);
});

// 按分計算
const updateFinalAmount = () => {
    const amt = Number(document.getElementById("amount").value) || 0;
    const rt = Number(document.getElementById("rate").value) || 0;
    document.getElementById("finalAmount").value = Math.floor(amt * rt / 100);
};
document.getElementById("amount").addEventListener("input", updateFinalAmount);
document.getElementById("rate").addEventListener("input", updateFinalAmount);

// 保存と読み込み
async function saveData() {
    const user = auth.currentUser;
    if (user) {
        await set(ref(db, "users/" + user.uid), { sales, expense });
    }
}

async function loadData() {
    const user = auth.currentUser;
    const snapshot = await get(ref(db, "users/" + user.uid));
    if (snapshot.exists()) {
        const data = snapshot.val();
        sales = data.sales || [];
        expense = data.expense || [];
    }
    calc(); 
}

window.addData = async function() {
    const mode = document.getElementById("mode").value;
    const date = document.getElementById("date").value;
    const month = document.getElementById("month").value;
    if (!date) return alert("日付を選択してください");

    if (mode === "売上") {
        sales.push({
            date, month,
            category: document.getElementById("salesCategory").value,
            account: document.getElementById("salesAccount").value,
            amount: Number(document.getElementById("salesAmount").value) || 0,
            note: document.getElementById("salesNote").value
        });
        document.getElementById("salesAmount").value = "";
    } else {
        expense.push({
            date, month,
            account: document.getElementById("expenseAccount").value,
            payment: document.getElementById("payment").value,
            amount: Number(document.getElementById("finalAmount").value) || 0,
            note: document.getElementById("expenseNote").value
        });
        document.getElementById("amount").value = "";
    }
    await saveData();
    calc(); 
};

window.del = function(t, i) {
    if (!confirm("この行を削除しますか？")) return;
    if (t === "s") sales.splice(i, 1); else expense.splice(i, 1);
    saveData().then(calc);
};

function calc() {
    const sTotal = sales.reduce((a, b) => a + (b.amount || 0), 0);
    const eTotal = expense.reduce((a, b) => a + (b.amount || 0), 0);
    
    let boothFee = 0;
    sales.forEach(s => {
        if (s.category === "BOOTH") {
            boothFee += Math.ceil(s.amount * 0.056) + 45;
        }
    });

    document.getElementById("summary").innerHTML = `
        <strong>合計収支</strong><br>
        売上：${sTotal.toLocaleString()}円 / 経費：${eTotal.toLocaleString()}円<br>
        (BOOTH手数料目安：${boothFee.toLocaleString()}円)<br>
        利益：${(sTotal - eTotal).toLocaleString()}円
    `;
    render();
    renderMonthly();
}

function render() {
    const tbody = document.getElementById("dataBody");
    let html = "";

    sales.forEach((s, i) => {
        html += `<tr><td>${s.date}</td><td><small>売上</small><br>${s.category}</td><td>${s.amount.toLocaleString()}円</td><td><button onclick="del('s',${i})">削</button></td></tr>`;
    });
    expense.forEach((e, i) => {
        html += `<tr><td>${e.date}</td><td><small>経費</small><br>${e.account}</td><td>${e.amount.toLocaleString()}円</td><td><button onclick="del('e',${i})">削</button></td></tr>`;
    });

    tbody.innerHTML = html;
}

function renderMonthly() {
    let m = {};
    sales.forEach(s => { if(!m[s.month]) m[s.month]={s:0, e:0}; m[s.month].s += s.amount; });
    expense.forEach(e => { if(!m[e.month]) m[e.month]={s:0, e:0}; m[e.month].e += e.amount; });
    
    let html = "<ul>";
    Object.keys(m).sort((a,b)=>a-b).forEach(k => {
        html += `<li>${k}月：利益 ${(m[k].s - m[k].e).toLocaleString()}円</li>`;
    });
    document.getElementById("monthlySummary").innerHTML = html + "</ul>";
}

window.downloadCSV = function() {
    let csv = "\uFEFF日付,種類,詳細,金額\n";
    sales.forEach(s => csv += `${s.date},売上,${s.category},${s.amount}\n`);
    expense.forEach(e => csv += `${e.date},経費,${e.account},${e.amount}\n`);
    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "keiri.csv";
    link.click();
};

window.saveAndClose = async function() {
    await saveData();
    alert("クラウド保存が完了しました。");
};
</script>
</body>
</html>
