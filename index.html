<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-title" content="経理">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん帳簿</title>

<style>
body { font-family: sans-serif; padding: 10px; }
input, select, button { width:100%; margin:5px 0; padding:10px; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginArea">
<h2>ログイン</h2>
<input type="text" id="id" placeholder="ID">
<input type="password" id="pass" placeholder="パスワード">
<button onclick="login()">ログイン</button>
</div>

<!-- メイン -->
<div id="mainArea" class="hidden">

<select id="mode">
<option value="売上">売上</option>
<option value="経費">経費</option>
</select>

<input type="date" id="date">
<input type="text" id="month" readonly placeholder="月">

<!-- 売上 -->
<div id="salesArea">
<input type="number" id="salesAmount" placeholder="売上金額">
</div>

<!-- 経費 -->
<div id="expenseArea" class="hidden">
<input type="number" id="amount" placeholder="支払金額">
<input type="number" id="rate" placeholder="按分率">
<input type="number" id="finalAmount" readonly placeholder="経費計上額">
</div>

<button onclick="addData()">追加</button>

<div id="summary"></div>

</div>

<script>

// ===== ユーザー =====
const users = {
  "admin": "1234",
  "user": "0000",
  "yuha": "1324",
  "u-to": "5678"
};

let currentUser = "";

// ===== ログイン =====
function login(){
  const idValue = document.getElementById("id").value.trim();
  const passValue = document.getElementById("pass").value.trim();

  if(users[idValue] && users[idValue] === passValue){
    currentUser = idValue;

    document.getElementById("loginArea").classList.add("hidden");
    document.getElementById("mainArea").classList.remove("hidden");

    initApp();
    loadData();
  }else{
    alert("IDかパスワード違います");
  }
}

// ===== 初期化 =====
function initApp(){

  document.getElementById("date").addEventListener("change",()=>{
    const d=new Date(document.getElementById("date").value);
    document.getElementById("month").value=d.getMonth()+1;
  });

  document.getElementById("mode").addEventListener("change",()=>{
    document.getElementById("salesArea").classList.toggle("hidden", mode.value!=="売上");
    document.getElementById("expenseArea").classList.toggle("hidden", mode.value!=="経費");
  });

  document.getElementById("rate").addEventListener("input",()=>{
    const amount = document.getElementById("amount").value;
    const rate = document.getElementById("rate").value;
    document.getElementById("finalAmount").value = Math.floor(amount * rate / 100);
  });

}

// ===== データ =====
let sales=[];
let expense=[];

function getKey(type){
  return type + "_" + currentUser;
}

function saveData(){
  localStorage.setItem(getKey("sales"), JSON.stringify(sales));
  localStorage.setItem(getKey("expense"), JSON.stringify(expense));
}

function loadData(){
  sales = JSON.parse(localStorage.getItem(getKey("sales"))) || [];
  expense = JSON.parse(localStorage.getItem(getKey("expense"))) || [];
  calc();
}

// ===== 追加 =====
function addData(){
  if(document.getElementById("mode").value==="売上"){
    sales.push({ amount:Number(document.getElementById("salesAmount").value) });
  }else{
    expense.push({ amount:Number(document.getElementById("finalAmount").value) });
  }

  saveData();
  calc();
}

// ===== 集計 =====
function calc(){
  let s=sales.reduce((a,b)=>a+b.amount,0);
  let e=expense.reduce((a,b)=>a+b.amount,0);
  document.getElementById("summary").innerHTML =
    `売上:${s}円 / 経費:${e}円 / 利益:${s-e}円`;
}

</script>

</body>
</html>
