<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-title" content="経理">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<link rel="apple-touch-icon" href="icon.png">

<title>かんたん帳簿</title>

<style>
body { font-family: sans-serif; padding: 8px; }
input, select, button { width:100%; margin:3px 0; padding:8px; }
.hidden { display:none; }
table { width:100%; border-collapse: collapse; }
td, th { border:1px solid #ccc; padding:3px; font-size:12px; }
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginArea">
<h2>ログイン</h2>
<input type="text" id="id" placeholder="メール">
<input type="password" id="pass" placeholder="パスワード">
<button onclick="login()">ログイン</button>
<button onclick="signup()">新規登録</button>
</div>

<!-- メイン -->
<div id="mainArea" class="hidden">

<select id="mode">
<option value="売上">売上</option>
<option value="経費">経費</option>
</select>

<input type="date" id="date">
<input type="text" id="month" readonly>

<!-- 売上 -->
<div id="salesArea">
<label>売上区分</label>
<select id="salesCategory">
<option>BOOTH</option><option>LINE</option><option>Kindle</option><option>その他</option>
</select>

<label>勘定科目</label>
<select id="salesAccount">
<option>売上</option><option>雑収入</option>
</select>

<label>売上金額</label>
<input type="number" id="salesAmount">
<label>備考</label>
<input type="text" id="salesNote">
</div>

<!-- 経費 -->
<div id="expenseArea" class="hidden">
<label>勘定科目</label>
<select id="expenseAccount">
<option>通信費</option><option>サブスク</option><option>水道光熱費</option><option>消耗品費</option><option>地代家賃</option><option>雑費</option>
</select>

<label>支払方法</label>
<select id="payment">
<option>現金</option><option>口座引落</option><option>クレカ</option><option>電子マネー</option><option>その他</option>
</select>

<label>支払金額</label>
<input type="number" id="amount">
<label>按分率（%）</label>
<input type="number" id="rate">
<label>経費計上額</label>
<input type="number" id="finalAmount">
<label>備考</label>
<input type="text" id="expenseNote">
</div>

<button onclick="addData()">追加</button>
<button onclick="downloadCSV()">CSV</button>
<button onclick="saveAndClose()">保存して閉じる</button>
<div id="summary"></div>

<h3>一覧</h3>
<table id="dataTable"></table>

<h3>月別</h3>
<div id="monthlySummary"></div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Firebase設定 (あなたの設定をそのまま維持)
const firebaseConfig = {
  apiKey: "AIzaSyA-3BwLPxZUTLzXVeaFYkFyujbsRqXl_MQ",
  authDomain: "keiri-app-simple.firebaseapp.com",
  projectId: "keiri-app-simple",
  storageBucket: "keiri-app-simple.firebasestorage.app",
  messagingSenderId: "1023884345508",
  appId: "1:1023884345508:web:898993ee41b4be7cd62631"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

const loginArea = document.getElementById("loginArea");
const mainArea = document.getElementById("mainArea");

let sales = [];
let expense = [];

// ログイン状態の監視
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginArea.classList.add("hidden");
    mainArea.classList.remove("hidden");
    loadData();
  } else {
    loginArea.classList.remove("hidden");
    mainArea.classList.add("hidden");
  }
});

// ===== ログイン・登録 =====
window.login = () => {
  const email = document.getElementById("id").value;
  const password = document.getElementById("pass").value;
  signInWithEmailAndPassword(auth, email, password).catch(e => alert("ログイン失敗: " + e.message));
};

window.signup = () => {
  const email = document.getElementById("id").value;
  const password = document.getElementById("pass").value;
  createUserWithEmailAndPassword(auth, email, password).then(() => alert("登録完了！")).catch(e => alert(e.message));
};

// ===== 入力補助 =====
document.getElementById("date").onchange = (e) => {
  const d = new Date(e.target.value);
  document.getElementById("month").value = d.getMonth() + 1;
};

document.getElementById("mode").onchange = (e) => {
  document.getElementById("salesArea").classList.toggle("hidden", e.target.value !== "売上");
  document.getElementById("expenseArea").classList.toggle("hidden", e.target.value !== "経費");
};

document.getElementById("rate").oninput = document.getElementById("amount").oninput = () => {
  const amt = Number(document.getElementById("amount").value);
  const rt = Number(document.getElementById("rate").value);
  document.getElementById("finalAmount").value = Math.floor(amt * rt / 100);
};

// ===== データ操作 =====
async function saveData() {
  const user = auth.currentUser;
  if (!user) return;
  await set(ref(db, "users/" + user.uid), { sales, expense });
}

async function loadData() {
  const user = auth.currentUser;
  const snapshot = await get(ref(db, "users/" + user.uid));
  if (snapshot.exists()) {
    const data = snapshot.val();
    sales = data.sales || [];
    expense = data.expense || [];
  }
  calc();
}

window.addData = async function() {
  const mode = document.getElementById("mode").value;
  const dateVal = document.getElementById("date").value;
  const monthVal = document.getElementById("month").value;

  if (!dateVal) return alert("日付を入力してください");

  if (mode === "売上") {
    sales.push({
      date: dateVal,
      month: monthVal,
      category: document.getElementById("salesCategory").value,
      account: document.getElementById("salesAccount").value,
      amount: Number(document.getElementById("salesAmount").value),
      note: document.getElementById("salesNote").value
    });
    document.getElementById("salesAmount").value = "";
  } else {
    expense.push({
      date: dateVal,
      month: monthVal,
      account: document.getElementById("expenseAccount").value,
      payment: document.getElementById("payment").value,
      amount: Number(document.getElementById("finalAmount").value),
      note: document.getElementById("expenseNote").value
    });
    document.getElementById("amount").value = "";
    document.getElementById("finalAmount").value = "";
  }

  await saveData();
  calc();
};

window.del = function(type, index) {
  if (!confirm("削除しますか？")) return;
  if (type === 's') sales.splice(index, 1);
  else expense.splice(index, 1);
  saveData();
  calc();
};

// ===== 集計・表示 =====
function calc() {
  const sTotal = sales.reduce((a, b) => a + (Number(b.amount) || 0), 0);
  const eTotal = expense.reduce((a, b) => a + (Number(b.amount) || 0), 0);
  
  let boothFee = 0;
  sales.forEach(s => {
    if (s.category === "BOOTH") {
      boothFee += Math.ceil(s.amount * 0.056) + 45;
    }
  });

  document.getElementById("summary").innerHTML = `
    <strong>売上合計：</strong> ${sTotal.toLocaleString()} 円<br>
    <strong>経費合計：</strong> ${eTotal.toLocaleString()} 円<br>
    <small>(BOOTH手数料目安: ${boothFee.toLocaleString()} 円)</small><br>
    <strong>利益：</strong> ${(sTotal - eTotal).toLocaleString()} 円
  `;
  render();
  renderMonthly();
}

function render() {
  let html = `<tr><th>日付</th><th>区分/支払</th><th>科目</th><th>金額</th><th>備考</th><th></th></tr>`;
  sales.forEach((s, i) => {
    html += `<tr><td>${s.date}</td><td>${s.category}</td><td>${s.account}</td><td>${s.amount.toLocaleString()}</td><td>${s.note || ""}</td><td><button onclick="del('s',${i})">×</button></td></tr>`;
  });
  expense.forEach((e, i) => {
    html += `<tr><td>${e.date}</td><td>${e.payment}</td><td>${e.account}</td><td>${e.amount.toLocaleString()}</td><td>${e.note || ""}</td><td><button onclick="del('e',${i})">×</button></td></tr>`;
  });
  document.getElementById("dataTable").innerHTML = html;
}

function renderMonthly() {
  let m = {};
  sales.forEach(s => { if(!m[s.month]) m[s.month]={s:0, e:0}; m[s.month].s += s.amount; });
  expense.forEach(e => { if(!m[e.month]) m[e.month]={s:0, e:0}; m[e.month].e += e.amount; });

  let html = "<ul>";
  Object.keys(m).sort((a,b)=>a-b).forEach(k => {
    html += `<li>${k}月: 利益 ${(m[k].s - m[k].e).toLocaleString()}円</li>`;
  });
  document.getElementById("monthlySummary").innerHTML = html + "</ul>";
}

// ===== CSV出力 (Excel対応BOM付き) =====
window.downloadCSV = function() {
  let csv = "日付,種類,勘定科目,金額,備考\n";
  sales.forEach(s => csv += `${s.date},売上(${s.category}),${s.account},${s.amount},${s.note}\n`);
  expense.forEach(e => csv += `${e.date},経費(${e.payment}),${e.account},${e.amount},${e.note}\n`);

  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `keiri_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
};

window.saveAndClose = async () => {
  await saveData();
  alert("保存されました");
};
// ===== 表示 =====
function calc(){

  let s=sales.reduce((a,b)=>a+b.amount,0);
  let e=expense.reduce((a,b)=>a+b.amount,0);

  let boothFee = 0;

  sales.forEach(s=>{
    if(s.category === "BOOTH"){
      boothFee += Math.ceil(s.amount * 0.056) + 45;
    }
  });
  
summary.innerHTML=`
売上合計：${(s||0).toLocaleString()}円<br>
経費合計：${(e||0).toLocaleString()}円<br>
(BOOTH利用料：${boothFee.toLocaleString()}円)<br>
利益：${((s-e)||0).toLocaleString()}円
`;
  
  render();
  monthly();
}

function render(){

 let html="<tr><th>日付</th><th>区分</th><th>勘定科目</th><th>金額</th><th>備考</th><th></th></tr>";

  sales.forEach((s,i)=>{
    html+=`<tr>
<td>${s.date}</td>
<td>${s.category}</td>
<td>${s.account}</td>
<td>${s.amount.toLocaleString()}円</td>
<td>${s.note||""}</td>
<td><button onclick="del('s',${i})">削除</button></td>
</tr>`;
  });

  expense.forEach((e,i)=>{
    html+=`<tr>
<td>${e.date}</td>
<td>${e.payment}</td>
<td>${e.account}</td>
<td>${e.amount.toLocaleString()}円</td>
<td>${e.note||""}</td>
<td><button onclick="del('e',${i})">削除</button></td>
</tr>`;
  });

  dataTable.innerHTML=html;
}
window.del=function(t,i){
  if(t==="s"){sales.splice(i,1);}else{expense.splice(i,1);}
  saveData();
  calc();
};
window.saveAndClose = async function(){
  await saveData();
  alert("保存しました。ブラウザを閉じてOKです");
};
// ===== 月別 =====
function monthly(){

  let m={};

  sales.forEach(s=>{
    if(!m[s.month])m[s.month]={s:0,e:0};
    m[s.month].s+=s.amount;
  });

  expense.forEach(e=>{
    if(!m[e.month])m[e.month]={s:0,e:0};
    m[e.month].e+=e.amount;
  });

  let html="";
  Object.keys(m).forEach(k=>{
    html+=`${k}月：${(m[k].s-m[k].e).toLocaleString()}円<br>`;
  });

  monthlySummary.innerHTML=html;
}

// ===== 新規登録 =====
window.signup = function(){

  const email = document.getElementById("id").value;
  const password = document.getElementById("pass").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(()=>alert("登録OK"))
  .catch(e=>alert(e.message));
};

// ===== CSV =====
window.downloadCSV=function(){

  let csv="日付,区分,金額\n";

  sales.forEach(s=>{
    csv+=`${s.date},${s.category},${s.amount}\n`;
  });

  expense.forEach(e=>{
    csv+=`${e.date},${e.account},${e.amount}\n`;
  });

  const blob=new Blob([csv]);
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="keiri.csv";
  link.click();
};
// 入力したら自動保存
["salesAmount","salesNote","amount","rate","expenseNote"].forEach(id=>{
  const el = document.getElementById(id);
  if(el){
    el.addEventListener("input",()=>{
      localStorage.setItem(id, el.value);
    });
  }
});
["salesAmount","salesNote","amount","rate","expenseNote"].forEach(id=>{
  const val = localStorage.getItem(id);
  if(val){
    document.getElementById(id).value = val;
  }
});
</script>

</body>
</html>
