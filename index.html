<script>

// ===== ユーザー =====
const users = {
  "admin": "1234",
  "mama": "5678"
};

let currentUser = "";

// ===== ログイン =====
function login(){
  const idValue = document.getElementById("id").value.trim();
  const passValue = document.getElementById("pass").value.trim();

  if(users[idValue] && users[idValue] === passValue){
    currentUser = idValue;

    document.getElementById("loginArea").classList.add("hidden");
    document.getElementById("mainArea").classList.remove("hidden");

    initApp(); // ←ここ重要
    loadData();
  }else{
    alert("IDかパスワード違います");
  }
}

// ===== 初期化（ログイン後に実行）=====
function initApp(){

  const dateEl = document.getElementById("date");
  const modeEl = document.getElementById("mode");
  const rateEl = document.getElementById("rate");

  dateEl.addEventListener("change",()=>{
    const d=new Date(dateEl.value);
    document.getElementById("month").value=d.getMonth()+1;
  });

  modeEl.addEventListener("change",()=>{
    document.getElementById("salesArea").classList.toggle("hidden", modeEl.value!=="売上");
    document.getElementById("expenseArea").classList.toggle("hidden", modeEl.value!=="経費");
  });

  rateEl.addEventListener("input",()=>{
    const amount = document.getElementById("amount").value;
    const rate = rateEl.value;
    document.getElementById("finalAmount").value = Math.floor(amount * rate / 100);
  });

}

// ===== データ =====
let sales=[];
let expense=[];

function getKey(type){
  return type + "_" + currentUser;
}

function saveData(){
  localStorage.setItem(getKey("sales"), JSON.stringify(sales));
  localStorage.setItem(getKey("expense"), JSON.stringify(expense));
}

function loadData(){
  sales = JSON.parse(localStorage.getItem(getKey("sales"))) || [];
  expense = JSON.parse(localStorage.getItem(getKey("expense"))) || [];
  calc();
}

// ===== 追加 =====
function addData(){
  if(document.getElementById("mode").value==="売上"){
    sales.push({
      amount:Number(document.getElementById("salesAmount").value)
    });
  }else{
    expense.push({
      amount:Number(document.getElementById("finalAmount").value)
    });
  }

  saveData();
  calc();
}

// ===== 集計 =====
function calc(){
  let s=sales.reduce((a,b)=>a+b.amount,0);
  let e=expense.reduce((a,b)=>a+b.amount,0);
  document.getElementById("summary").innerHTML=
    `売上:${s}円 / 経費:${e}円 / 利益:${s-e}円`;
}

</script>
